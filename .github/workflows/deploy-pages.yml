name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Fix asset paths and inject URL normalization
        run: |
          set +o histexpand
          sed -i 's|href="/favicon.ico"|href="/mallorca-directory/favicon.ico"|g' dist/index.html
          sed -i 's|src="/_expo/static|src="/mallorca-directory/_expo/static|g' dist/index.html
          # Inject URL normalization + history interception for Expo Router
          # Strips /mallorca-directory prefix before router init, wraps push/replaceState to keep prefix
          node -e "
          const fs = require('fs');
          let h = fs.readFileSync('dist/index.html','utf-8');
          const s = '<script>(function(){var B=\"/mallorca-directory\",P=history.pushState,R=history.replaceState,S=false;history.pushState=function(s,t,u){if(!S&&typeof u==\"string\"&&u.indexOf(B)!=0&&u.indexOf(\"http\")!=0)u=B+u;return P.call(this,s,t,u)};history.replaceState=function(s,t,u){if(!S&&typeof u==\"string\"&&u.indexOf(B)!=0&&u.indexOf(\"http\")!=0)u=B+u;return R.call(this,s,t,u)};S=true;var p=location.pathname;if(p===B||p===B+\"/\"){R.call(history,null,\"\",\"/\")}else if(p.indexOf(B+\"/\")===0){R.call(history,null,\"\",p.substring(B.length))}S=false;window.addEventListener(\"popstate\",function(){S=true;var p=location.pathname;if(p.indexOf(B)===0){R.call(history,null,\"\",p.substring(B.length)||\"/\")}S=false;setTimeout(function(){var c=location.pathname;if(c.indexOf(B)!==0){S=true;R.call(history,null,\"\",B+c);S=false}},0)})})();</script>';
          h = h.replace('<head>', '<head>' + s);
          fs.writeFileSync('dist/index.html', h);
          "

      - name: Copy index.html as 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
